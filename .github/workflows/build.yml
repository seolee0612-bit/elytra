name: Build Fabric Mod

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.12"

      - name: Show repository files
        run: |
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Build Fabric mod
        run: |
          gradle --version
          gradle clean build --stacktrace --info

      - name: Show build outputs
        run: |
          find build -maxdepth 4 -type f | sort

      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        with:
          name: elytra-boundary-fabric-1.21.1
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error

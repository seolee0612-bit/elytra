name: Build Fabric Mod

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Verify repository root
        run: |
          test -f build.gradle
          test -f settings.gradle
          test -f src/main/resources/fabric.mod.json
          test -f .github/workflows/build.yml

      - name: Build Fabric mod
        run: gradle clean build --stacktrace

      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: elytra-boundary-1.21.1
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
